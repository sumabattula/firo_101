# NOTE: FIRO_module_Hydrolearn.ipynb downloads live data at runtime from
# cnrfc.noaa.gov (HEFS forecast zip) and cdec.water.ca.gov (observed storage/
# outflow). There is no cached copy of that data in this repo, so every CI run
# will hit those endpoints fresh. If either site is unreachable/slow from the
# runner, or the CNRFC issuance for CONFIG['issue_date'] has aged off their
# server, the run will fail or hang until the nbconvert timeout below.
# The notebook already has a GitHub-fallback for the CDEC (observed) data,
# but that fallback points at a suzanatimilsina/Hydrolearn_FIRO repo, not
# this one -- worth checking that URL still exists if you rely on it.
name: Run FIRO Notebook 

on:
  push:
    branches: [ main ]
    paths:
      - '**.ipynb'
      - '.github/workflows/run-notebook.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.ipynb'
  workflow_dispatch: {}

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Core tools needed to execute notebooks
          pip install jupyter nbconvert ipykernel papermill

          # If a requirements.txt exists, use it as the source of truth
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            # Matches the imports actually used in FIRO_module_Hydrolearn.ipynb
            pip install numpy pandas matplotlib requests openpyxl xlrd
          fi

      - name: Run notebook(s)
        run: |
          mkdir -p executed
          for nb in $(find . -maxdepth 1 -name "*.ipynb"); do
            echo "Running $nb"
            jupyter nbconvert \
              --to notebook \
              --execute \
              --output-dir=executed \
              --ExecutePreprocessor.timeout=1800 \
              "$nb"
          done

      - name: Upload executed notebook(s)
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebooks
          path: executed/*.ipynb
